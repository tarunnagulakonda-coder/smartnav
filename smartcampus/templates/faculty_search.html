<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Faculty Search - SmartCampus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8f9fa; }
        .search-container { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-control:focus { box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.2); border-color: #4361ee; }
        .navbar-brand { font-weight: 700; color: #4361ee !important; }
        .table { margin-top: 20px; }
        .badge-available { background-color: #d4edda; color: #155724; padding: 5px 10px; border-radius: 12px; font-weight: 600; font-size: 0.8rem; }
        .badge-busy { background-color: #f8d7da; color: #721c24; padding: 5px 10px; border-radius: 12px; font-weight: 600; font-size: 0.8rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-light bg-white shadow-sm px-4">
        <a class="navbar-brand" href="{% url 'dashboard' %}">← Back to Dashboard</a>
        <span class="badge bg-primary px-3 py-2">Faculty Search</span>
    </nav>
    <div class="container mt-5">
        <div class="search-container">
            <h3 class="fw-bold mb-4 text-dark">Find Faculty</h3>
            <div class="input-group mb-4">
                <input type="text" id="searchInput" class="form-control form-control-lg" placeholder="Search by Name, Department, or Specialization..." autocomplete="off">
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Faculty Name</th>
                            <th>Specialization / Dept</th>
                            <th>Cabin Location</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="resultsTable">
                        <!-- Filled by JS -->
                    </tbody>
                </table>
            </div>
            <div id="noResults" class="text-center text-muted" style="display: none; padding: 20px;">
                No faculty found matching your search.
            </div>
        </div>
    </div>

    <script>
        const searchInput = document.getElementById('searchInput');
        const resultsTable = document.getElementById('resultsTable');
        const noResults = document.getElementById('noResults');

        function fetchResults(query = '') {
            fetch(`/api/faculty/?q=${encodeURIComponent(query)}`)
                .then(res => res.json())
                .then(data => {
                    resultsTable.innerHTML = '';
                    if (data.length === 0) {
                        noResults.style.display = 'block';
                    } else {
                        noResults.style.display = 'none';
                        data.forEach(fac => {
                            const isAvail = fac.availability.toLowerCase() === 'available';
                            const statusDot = isAvail
                                ? '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#28a745;margin-right:6px;"></span>'
                                : '<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:#dc3545;margin-right:6px;"></span>';
                            const statClass = isAvail ? 'badge-available' : 'badge-busy';
                            const navBtn = isAvail
                                ? `<a href="/map/?dest_lat=${fac.lat}&dest_lng=${fac.lng}&dest_name=${encodeURIComponent(fac.location)}" class="btn btn-sm btn-success fw-bold px-3">🧭 Navigate</a>`
                                : `<a href="/map/?dest_lat=${fac.lat}&dest_lng=${fac.lng}&dest_name=${encodeURIComponent(fac.location)}" class="btn btn-sm btn-outline-secondary fw-bold px-3">View on Map</a>`;
                            const tr = document.createElement('tr');
                            tr.innerHTML = `
                                <td class="fw-bold text-dark">${fac.name}</td>
                                <td>${fac.specialization}<br><small class="text-muted">${fac.department}</small></td>
                                <td><span class="text-primary fw-bold">${fac.location}</span></td>
                                <td>${statusDot}<span class="${statClass}">${fac.availability}</span></td>
                                <td>${navBtn}</td>
                            `;
                            resultsTable.appendChild(tr);
                        });
                    }
                });
        }

        // Trigger on typing with basic debounce
        let timeout = null;
        searchInput.addEventListener('input', (e) => {
            clearTimeout(timeout);
            timeout = setTimeout(() => {
                fetchResults(e.target.value);
            }, 300);
        });

        // Initial Load
        fetchResults();
    </script>
</body>
</html>
