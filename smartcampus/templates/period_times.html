<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Period Times - SmartCampus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4361ee; --secondary: #3f37c9; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .wizard { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); padding: 50px 40px; width: 550px; max-width: 95%; max-height: 90vh; overflow-y: auto; }
        .step-indicator { display: flex; gap: 10px; margin-bottom: 30px; }
        .step { flex: 1; height: 6px; border-radius: 3px; background: #e9ecef; }
        .step.active { background: var(--primary); }
        h2 { font-weight: 700; color: #2b2d42; margin-bottom: 8px; }
        p { color: #6c757d; margin-bottom: 25px; }
        .period-row { display: flex; gap: 15px; align-items: center; margin-bottom: 18px; padding: 15px; background: #f8f9fa; border-radius: 12px; border: 1px solid #e9ecef; transition: all 0.2s; }
        .period-row:hover { border-color: var(--primary); background: #f0f4ff; }
        .period-label { font-weight: 700; color: var(--primary); font-size: 0.95rem; min-width: 75px; }
        .time-group { display: flex; flex-direction: column; gap: 4px; flex: 1; }
        .time-group label { font-size: 0.8rem; color: #6c757d; font-weight: 600; }
        input[type="time"] { padding: 10px 12px; border: 2px solid #e9ecef; border-radius: 8px; font-size: 1rem; font-family: 'Inter', sans-serif; transition: all 0.3s; }
        input[type="time"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(67, 97, 238, 0.15); outline: none; }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; margin-top: 10px; }
        .btn:hover { background: var(--secondary); transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="wizard">
        <div class="step-indicator">
            <div class="step active"></div>
            <div class="step active"></div>
            <div class="step"></div>
        </div>
        <h2>🕐 Step 2: Period Times</h2>
        <p>Set the start and end time for each of your <strong>{{ settings.periods_per_day }} periods</strong>.</p>
        
        <form method="POST">
            {% csrf_token %}
            {% for i in periods_range %}
            <div class="period-row">
                <div class="period-label">Period {{ i }}</div>
                <div class="time-group">
                    <label>Start Time</label>
                    <input type="time" name="start_{{ i }}" required>
                </div>
                <div class="time-group">
                    <label>End Time</label>
                    <input type="time" name="end_{{ i }}" required>
                </div>
            </div>
            {% endfor %}

            <button type="submit" class="btn">Continue → Weekly Schedule</button>
        </form>
    </div>
</body>
</html>
