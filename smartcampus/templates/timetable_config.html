<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable Setup - SmartCampus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #4361ee; --secondary: #3f37c9; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
        .wizard { background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.1); padding: 50px 40px; width: 500px; max-width: 95%; }
        .step-indicator { display: flex; gap: 10px; margin-bottom: 30px; }
        .step { flex: 1; height: 6px; border-radius: 3px; background: #e9ecef; }
        .step.active { background: var(--primary); }
        h2 { font-weight: 700; color: #2b2d42; margin-bottom: 8px; }
        p { color: #6c757d; margin-bottom: 25px; }
        .form-group { margin-bottom: 25px; }
        label { font-weight: 600; color: #495057; font-size: 0.95rem; display: block; margin-bottom: 8px; }
        select, input[type="number"] { width: 100%; padding: 14px 16px; border: 2px solid #e9ecef; border-radius: 10px; font-size: 1.1rem; font-family: 'Inter', sans-serif; appearance: auto; transition: all 0.3s; }
        select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.15); outline: none; }
        .btn { width: 100%; padding: 14px; background: var(--primary); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: 'Inter', sans-serif; }
        .btn:hover { background: var(--secondary); transform: translateY(-2px); }
        .hint { font-size: 0.85rem; color: #adb5bd; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="wizard">
        <div class="step-indicator">
            <div class="step active"></div>
            <div class="step"></div>
            <div class="step"></div>
        </div>
        <h2>📋 Step 1: Timetable Configuration</h2>
        <p>Configure your weekly teaching schedule for <strong>{{ faculty.name }}</strong></p>
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>How many working days per week?</label>
                <select name="working_days">
                    <option value="5">5 Days (Mon-Fri)</option>
                    <option value="6" selected>6 Days (Mon-Sat)</option>
                </select>
                <div class="hint">Most colleges follow 5 or 6 day weeks.</div>
            </div>
            
            <div class="form-group">
                <label>How many periods per day?</label>
                <select name="periods_per_day">
                    <option value="5">5 Periods</option>
                    <option value="6">6 Periods</option>
                    <option value="7">7 Periods</option>
                    <option value="8" selected>8 Periods</option>
                </select>
                <div class="hint">Include lab periods if applicable.</div>
            </div>

            <button type="submit" class="btn">Continue → Set Period Times</button>
        </form>
    </div>
</body>
</html>
